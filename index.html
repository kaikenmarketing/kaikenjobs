<!DOCTYPE html>
<html lang="el">
<head><meta charset="UTF-8"><title>Kaiken Marketing Poster</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&family=Lobster&display=swap");
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow:hidden;}
body{width:794px;height:1123px;}
.poster{width:794px;height:1123px;position:relative;overflow:hidden;background:#FFFFFF;}

.accent-bg{position:absolute;top:0;right:0;width:50%;height:100%;background:linear-gradient(160deg,#1B3A6B 0%,#132D54 100%);clip-path:polygon(55% 0,100% 0,100% 100%,5% 100%);z-index:1;}
.red-strip{position:absolute;top:0;right:0;width:50%;height:100%;background:#E31B23;clip-path:polygon(54% 0,56% 0,6% 100%,5% 100%);z-index:2;}

.top-bar{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#E31B23 0%,#E31B23 40%,#1B3A6B 40%);z-index:10;}

.logo-center{position:absolute;top:25px;left:50%;transform:translateX(-50%);z-index:10;width:140px;height:auto;}

.main-headline{position:absolute;top:160px;left:48px;z-index:10;max-width:520px;}
.main-headline .we-are{font-family:"Archivo Black",sans-serif;font-size:110px;line-height:0.95;color:#1B3A6B;letter-spacing:3px;}
.main-headline .hiring{font-family:"Archivo Black",sans-serif;font-size:110px;line-height:0.95;color:#E31B23;letter-spacing:3px;}

.subline{position:absolute;top:430px;left:48px;z-index:10;max-width:420px;}
.subline-text{font-family:"Lobster",cursive;font-size:34px;color:#1B3A6B;line-height:1.3;}
.subline-text .red{color:#E31B23;}

.roles{position:absolute;top:540px;left:48px;z-index:10;display:flex;flex-direction:column;gap:10px;}
.role{font-family:"Inter",sans-serif;font-size:15px;font-weight:800;color:#FFFFFF;
  background:#E31B23;border-radius:6px;padding:10px 20px;text-transform:uppercase;letter-spacing:1px;
  display:inline-block;width:fit-content;}
.role:nth-child(2){background:#1B3A6B;}
.role:nth-child(3){background:#E31B23;}

.right-content{position:absolute;bottom:100px;right:50px;z-index:10;display:flex;flex-direction:column;align-items:center;gap:20px;}
.future-text{font-family:"Lobster",cursive;font-size:34px;color:#FFFFFF;text-align:center;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,0.2);}
.qr-block{background:#fff;border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 12px 40px rgba(0,0,0,0.2);}
.qr-img{width:160px;height:160px;}
.qr-label{font-family:"Inter",sans-serif;font-size:9px;font-weight:800;color:#E31B23;letter-spacing:2px;text-transform:uppercase;}
.cta-text{font-family:"Inter",sans-serif;font-size:16px;font-weight:700;color:rgba(255,255,255,0.9);text-align:center;max-width:220px;line-height:1.4;}

.bottom-info{position:absolute;bottom:50px;left:48px;z-index:10;display:flex;gap:30px;}
.info-item{display:flex;flex-direction:column;gap:2px;}
.info-label{font-family:"Inter",sans-serif;font-size:8px;font-weight:800;color:#E31B23;letter-spacing:2px;text-transform:uppercase;}
.info-value{font-family:"Inter",sans-serif;font-size:13px;font-weight:600;color:#1B3A6B;}

.deco-circle{position:absolute;bottom:-80px;left:-80px;width:250px;height:250px;border:2px solid rgba(227,27,35,0.15);border-radius:50%;z-index:5;}
</style></head>
